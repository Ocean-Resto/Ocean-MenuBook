<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Menu - Opening</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Playfair Display', serif;
  background: #07141d;
}

/* =========================
   THEME VARIABLES
========================= */

/* DEFAULT = sedikit gelap (deep ocean luxury) */
:root {
  --bg-main: #10222d;
  --gold-main: #d4af37;
  --gold-soft: rgba(212,175,55,0.5);
  --text-soft: #b8b8b8;
}

/* Gelap sedang = sunset blue luxury */
body.theme-mid {
  --bg-main: #2f4a5a;
  --gold-main: #f1c86a;
  --gold-soft: rgba(241,200,106,0.5);
  --text-soft: #f2dfc2;
}

/* Terang / hangat = golden sunset premium */
body.theme-warm {
  --bg-main: #6b4b3e;
  --gold-main: #ffd98a;
  --gold-soft: rgba(255,217,138,0.55);
  --text-soft: #fff0d2;
}
/* =========================
   COLOR SWITCHER
========================= */

.theme-switcher {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  gap: 10px;
  padding: 10px 14px;
  border: 1px solid rgba(212,175,55,0.35);
  border-radius: 14px;
  background: rgba(10, 10, 10, 0.55);
  backdrop-filter: blur(10px);
}

.theme-btn {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.25);
  transition: 0.25s;
}

.theme-btn:hover {
  transform: scale(1.12);
}

.theme-btn.dark {
  background: #10222d;
}

.theme-btn.mid {
  background: #18313f;
}

.theme-btn.warm {
  background: #5a4a35;
}

/* BACKGROUND REAL */
.bg-black {
  position: absolute;
  inset: 0;
  background: var(--bg-main);
  z-index: 0;
  transition: 0.35s ease;
}

/* COVER BASE (SAMA DENGAN COVER 1) */
.page {
  position: relative;
  width: 100%;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FRAME */
.page-frame {
  position: relative;
  z-index: 1;
  width: 90%;
  max-width: 420px;
  aspect-ratio: 210 / 297;
  border: 1.5px solid #d4af37;
  display: flex;
  justify-content: center;
  align-items: center;
}

.page-frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212,175,55,0.5);
}

/* CONTENT */
.page-content {
  text-align: center;
  width: 70%;
  color: #eaeaea;
}

/* QUOTE */
.quote {
  font-size: 16px;
  line-height: 1.6;
  font-style: italic;
  margin-bottom: 25px;
}

/* AUTHOR */
.author {
  font-size: 11px;
  letter-spacing: 2px;
  color: #d4af37;
}

/* ================= PRINT ================= */
@page {
  size: A4;
  margin: 0;
}

@media print {

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  html, body {
    width: 210mm;
    height: 297mm;
    overflow: hidden;
  }

  .page {
    width: 210mm;
    height: 297mm;
    position: relative;
    display: block; /* 🔥 jangan flex saat print */
  }

  .bg-black {
    position: absolute;
    inset: 0;
  }

  .page-frame {
    position: absolute;
    width: 180mm;
    height: 267mm;

    /* 🔥 CENTER FIX */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* 🔥 PENTING BANGET */
  .page, .page-frame {
    page-break-after: avoid;
    page-break-inside: avoid;
  }
}
  
/* NAVIGATION ARROWS */
.nav-arrow {
  position: fixed;
  bottom: 20px;
  z-index: 999;
}

.nav-arrow a {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: 1px solid #d4af37;
  border-radius: 50%;
  color: #d4af37;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

/* HOVER */
.nav-arrow a:hover {
  background: #d4af37;
  color: #000;
}

/* POSISI */
.nav-arrow.next {
  right: 20px;
}

.nav-arrow.prev {
  left: 20px;
}

/* HILANG SAAT PRINT */
@media print {
  .nav-arrow {
    display: none !important;
  }
}
.logo img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 1px solid #d4af37;
  margin-bottom: 25px;
  opacity: 0.9;
}

.quote {
  font-size: 15px;
  line-height: 1.8;
}

.actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
}

.actions button {
  padding: 12px 20px;
  border: 1px solid #d4af37;
  background: #111;
  color: #d4af37;
  cursor: pointer;
  font-family: inherit;
  border-radius: 8px;
  font-size: 14px;
}

.actions button:hover {
  background: #d4af37;
  color: #000;
}
.actions {
  position: relative;
  z-index: 9999;
}
</style>
</head>

<body>

  <!-- =========================
     THEME SWITCHER
========================= -->

<div class="theme-switcher">
  <div class="theme-btn dark" onclick="setTheme('dark')"></div>
  <div class="theme-btn mid" onclick="setTheme('mid')"></div>
  <div class="theme-btn warm" onclick="setTheme('warm')"></div>
</div>


<div class="page">

  <div class="bg-black"></div>

  <div class="page-frame">
   <div class="page-content">

  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="quote">
    “A great dining experience is not just about food,<br>
    but about memory.”
  </div>

  <div class="author">
    — OCEAN CAFE & RESTO —
  </div>

</div>
</div>

</div>

<div class="actions">
  <button onclick="window.print()">Export PDF</button>
  <button onclick="downloadPNG()">Download PNG</button>
</div>
  
<div class="nav-arrow prev">
  <a href="index.html">
    <i class="fas fa-arrow-left"></i>
  </a>
</div>

<div class="nav-arrow next">
  <a href="page3.html">
    <i class="fas fa-arrow-right"></i>
  </a>
</div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
async function downloadPNG() {
  /* 🔥 target tetap frame A4 */
  const target = document.querySelector(".page-frame");

  const actions = document.querySelector(".actions");
  const themeSwitcher = document.querySelector(".theme-switcher");
  const navArrow = document.querySelector(".nav-arrow");

  /* ambil warna theme aktif dari background asli */
  const bgColor = getComputedStyle(
    document.querySelector(".bg-black")
  ).backgroundColor;

  /* sembunyikan tombol sementara */
  if (actions) actions.style.display = "none";
  if (themeSwitcher) themeSwitcher.style.display = "none";
  if (navArrow) navArrow.style.display = "none";

  /* 🔥 kasih background langsung ke frame sementara */
  const originalBg = target.style.background;
  target.style.background = bgColor;

  /* delay kecil biar render bersih */
  await new Promise(resolve => setTimeout(resolve, 200));

  const canvas = await html2canvas(target, {
    scale: 7,
    useCORS: true,
    backgroundColor: bgColor, /* penting: jangan null */
    logging: false
  });

  const link = document.createElement("a");
  link.download = "ocean-menu-HD.png";
  link.href = canvas.toDataURL("image/png", 1.0);
  link.click();

  /* balikin seperti semula */
  target.style.background = originalBg;

  if (actions) actions.style.display = "flex";
  if (themeSwitcher) themeSwitcher.style.display = "flex";
  if (navArrow) navArrow.style.display = "block";
}
</script>
<script>
function setTheme(mode) {
  document.body.classList.remove("theme-mid", "theme-warm");

  if (mode === "mid") {
    document.body.classList.add("theme-mid");
  }

  if (mode === "warm") {
    document.body.classList.add("theme-warm");
  }
}
</script>
</body>
</html>
