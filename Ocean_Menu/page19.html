<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>VIP Student Black Card</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b0b0b;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:'Poppins',sans-serif;
  overflow:hidden;

  flex-direction:column;
  gap:30px;
}

@keyframes shine{

  from{
    transform:translateX(-100%);
  }

  to{
    transform:translateX(100%);
  }

}

/* ===== DECOR ===== */

.circle-top{

  position:absolute;
  width:180px;
  height:180px;

  border-radius:50%;

  top:-110px;
  right:-60px;

  background:
  radial-gradient(
    circle,
    rgba(255,215,120,.10),
    transparent 70%
  );

  z-index:0;

}

.circle-bottom{

  position:absolute;
  width:140px;
  height:140px;

  border-radius:50%;

  bottom:-80px;
  left:-70px;

  background:
  radial-gradient(
    circle,
    rgba(255,215,120,.05),
    transparent 70%
  );

  z-index:0;

}
  
/* ===== TOP ===== */

.top{

  display:flex;
  justify-content:space-between;
  align-items:flex-start;

  position:relative;
  z-index:2;

}

.brand{

  color:#f5d18a;
  font-size:11px;
  letter-spacing:3px;
  font-weight:600;

}

.level{

  color:#f5d18a;
  border:1px solid rgba(245,209,138,.35);

  padding:4px 10px;
  border-radius:30px;

  font-size:8px;
  letter-spacing:1px;

  background:rgba(255,215,120,.05);

}

/* ===== CENTER ===== */

.center{

  position:relative;
  z-index:2;

  margin-top:22px;

}

.badge{

  font-size:7px;

  color:#f5d18a;

  border:1px solid rgba(245,209,138,.18);

  background:rgba(255,215,120,.06);

  padding:4px 7px;

  border-radius:20px;

  letter-spacing:.5px;

}

.owner{

  color:white;

}

.owner-name{

  font-size:11px;
  font-weight:600;
  letter-spacing:1px;

}

.owner-role{

  margin-top:2px;

  font-size:7px;
  color:#bbbbbb;

  letter-spacing:1px;

}

.number{

  color:#f5d18a;

  font-size:10px;

  letter-spacing:3px;

}

/* ===== CHIP ===== */

.chip{

  position:absolute;

  right:20px;
  top:40px;

  width:42px;
  height:30px;

  border-radius:8px;

  background:
  linear-gradient(
    135deg,
    #caa85e,
    #ffe7a8,
    #9b7939
  );

  z-index:2;

  box-shadow:
  inset 0 1px 2px rgba(255,255,255,.35);

}

.chip::before{

  content:"";

  position:absolute;

  top:0;
  bottom:0;
  left:50%;

  width:1px;

  background:rgba(0,0,0,.15);

}

.chip::after{

  content:"";

  position:absolute;

  left:0;
  right:0;
  top:50%;

  height:1px;

  background:rgba(0,0,0,.15);

}

/* ===== PRINT ===== */

@media print{

  body{
    background:white;
  }

  .card{
    box-shadow:none;
  }

}

/* ===== CARD ===== */

.card{

  width:85.6mm;
  height:54mm;

  position:relative;
  overflow:hidden;

  border-radius:0;

  background:
  linear-gradient(
    135deg,
    #050505,
    #111111 45%,
    #181818 60%,
    #050505
  );

  border:1.5px solid #d4af37;

  padding:20px;
}
/* ===== OUTER GOLD FRAME ===== */

.card::after{

  content:"";

  position:absolute;

  inset:10px;

  border-radius:0px;

  border:1px solid rgba(212,175,55,.55);

  pointer-events:none;
}
/* ===== GOLD LIGHT EFFECT ===== */

.top,
.center,
.bottom{

  position:relative;
  z-index:2;

}

.chip{
  z-index:2;
}
/* ===== GLOW LINE ===== */

.gold-line{

  position:absolute;

  left:22px;
  right:22px;
  bottom:48px;

  height:1px;

  background:
  linear-gradient(
    90deg,
    transparent,
    #f7e7a1,
    #fff1b3,
    #f7e7a1,
    transparent
  );

  box-shadow:
  0 0 8px rgba(255,215,120,.95),
  0 0 18px rgba(255,215,120,.75),
  0 0 28px rgba(255,215,120,.55);

  z-index:2;

}

/* ===== BADGE GLOW ===== */

.badge{

  font-size:7px;

  color:#ffe7a8;

  border:1px solid rgba(255,223,130,.35);

  background:rgba(255,215,120,.07);

  padding:4px 7px;

  border-radius:20px;

  letter-spacing:.5px;

  box-shadow:
  0 0 6px rgba(255,223,130,.4),
  inset 0 0 6px rgba(255,223,130,.12);

}

/* ===== NUMBER GLOW ===== */

.number{

  color:#ffe7a8;

  font-size:10px;

  letter-spacing:3px;

  text-shadow:
  0 0 8px rgba(255,223,130,.9),
  0 0 18px rgba(255,223,130,.5);

}

/* ===== CENTER ===== */

.center{

  position:relative;
  z-index:2;

  margin-top:18px;

  display:flex;
  flex-direction:column;
  gap:5px;

}

/* ===== TITLE ===== */

.title{

  color:white;

  font-size:14px;
  font-weight:700;

  letter-spacing:2px;
  line-height:1;

  text-shadow:
  0 0 10px rgba(255,215,120,.18);

}

/* ===== SUBTITLE ===== */

.subtitle{

  color:#f2c66d;

  font-size:8px;

  letter-spacing:4px;

  text-transform:uppercase;

}

/* ===== DESCRIPTION ===== */

.description{

  width:72%;

  color:#d7d7d7;

  font-size:7px;

  line-height:1.8;

  margin-top:4px;

}

/* ===== GOLD DIVIDER ===== */

.divider{

  width:100%;
  height:1px;

  margin:2px 0 4px;

  background:
  linear-gradient(
    90deg,
    transparent,
    rgba(212,175,55,.55),
    transparent
  );

  box-shadow:
  0 0 10px rgba(255,215,120,.5);

}

/* ===== BENEFIT ===== */

.benefit{

  margin-top:6px;

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:10px;

  align-items:center;

}

/* ===== BENEFIT ITEM ===== */

.benefit-item{

  text-align:center;

  position:relative;

}

/* garis pemisah */
.benefit-item:not(:last-child)::after{

  content:"";

  position:absolute;

  right:-5px;
  top:8px;

  width:1px;
  height:38px;

  background:
  linear-gradient(
    to bottom,
    transparent,
    rgba(255,215,120,.8),
    transparent
  );

}

/* ===== ICON ===== */

.icon{

  width:28px;
  height:28px;

  margin:auto;

  border-radius:50%;

  border:1px solid rgba(255,215,120,.7);

  display:flex;
  align-items:center;
  justify-content:center;

  color:#f7e7a1;

  font-size:12px;

  box-shadow:
  0 0 12px rgba(255,215,120,.25),
  inset 0 0 10px rgba(255,215,120,.08);

}

/* ===== BENEFIT TITLE ===== */

.benefit-title{

  margin-top:8px;

  color:white;

  font-size:6.5px;

  line-height:1.5;

  letter-spacing:1px;

}

/* ===== BOTTOM ===== */

.bottom{

  position:absolute;

  left:22px;
  right:22px;
  bottom:4px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding-top:10px;

  border-top:1px solid rgba(255,215,120,.2);

}

/* ===== OWNER ===== */

.owner-name{

  color:white;

  font-size:10px;
  font-weight:600;

  letter-spacing:1px;

}

.owner-role{

  margin-top:3px;

  color:#f2c66d;

  font-size:7px;

  letter-spacing:3px;

}

/* ===== MEMBER ID ===== */

.member{

  text-align:right;

}

.member-label{

  color:#f2c66d;

  font-size:7px;

  letter-spacing:3px;

}

.number{

  margin-top:3px;

  color:#f7e7a1;

  font-size:14px;
  font-weight:700;

  letter-spacing:2px;

  text-shadow:
  0 0 10px rgba(255,215,120,.7);

}

/* NAVIGATION ARROWS */
.nav-arrow {
  position: fixed;
  bottom: 20px;
  z-index: 999;
}

.nav-arrow a {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: 1px solid #d4af37;
  border-radius: 50%;
  color: #d4af37;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

/* HOVER */
.nav-arrow a:hover {
  background: #d4af37;
  color: #000;
}

/* POSISI */
.nav-arrow.next {
  right: 20px;
}

.nav-arrow.prev {
  left: 20px;
}

.actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
}

.actions button {
  padding: 12px 20px;
  border: 1px solid #d4af37;
  background: #111;
  color: #f7e7a1;
  cursor: pointer;
  font-family: inherit;
  border-radius: 8px;
  font-size: 14px;
}

.actions button:hover {
  background: #d4af37;
  color: #000;
}

.card-inner{
  position:absolute;

  top:14px;
  left:14px;
  right:14px;
  bottom:14px;

  overflow:hidden;
}

*{
  box-sizing:border-box;
}

.controls{

  width:85.6mm;

  display:flex;
  flex-direction:column;

  gap:12px;

  margin-top:20px;

}

.controls input{

  width:100%;

  padding:12px 14px;

  background:#111;

  border:1px solid #d4af37;

  border-radius:10px;

  color:white;

  font-size:14px;

  outline:none;

  font-family:'Poppins',sans-serif;

}

.controls input:focus{

  border-color:#f7e7a1;

  box-shadow:
  0 0 8px rgba(212,175,55,.25);

}
</style>
</head>

<body>

<div class="card">
   <div class="card-inner">

  <div class="circle-top"></div>
  <div class="circle-bottom"></div>

  <!-- TOP -->
  <div class="top">

    <div class="brand">
      OCEAN BLACK CARD
    </div>

    <div class="level">
      VIP ACCESS
    </div>

  </div>

  <!-- CHIP -->
  <div class="chip"></div>

  <!-- CENTER -->
<div class="center">

  <div class="title" id="memberName">
  Mr.BAHA
</div>

  <div class="subtitle" id="schoolName">
  VIP STUDENT MEMBERSHIP
</div>

  <div class="subtitle">
    VIP STUDENT MEMBERSHIP
  </div>

  <div class="divider"></div>

  <div class="description">
  Exclusive membership with priority access
  and premium student privileges.
  </div>

</div>

  <!-- BOTTOM -->
 <div class="bottom">

  <div>

    <div class="owner-name">
      Special Benefit From Ocean
    </div>

    <div class="owner-role">
      OCEAN STUDENT SOCIETY
    </div>

  </div>

  <div class="member">

    <div class="member-label">
      MEMBER ID
    </div>

    <div class="number" id="memberId">
  #0001
</div>

  </div>

</div>

</div>
</div>

<div class="controls">

  <input
    type="text"
    id="nameInput"
    placeholder="Input Member Name"
    oninput="updateName()"
  >

  <input
    type="text"
    id="schoolInput"
    placeholder="Input School Name"
    oninput="updateSchool()"
  >

  <input
    type="text"
    id="memberIdInput"
    placeholder="Input Member ID"
    oninput="updateMemberId()"
  >

</div>

  <div class="actions">
  <button onclick="window.print()">Export PDF</button>
  <button onclick="downloadPNG()">Download PNG</button>
</div>
  
 <div class="nav-arrow prev">
  <a href="page18.html">
    <i class="fas fa-arrow-left"></i>
  </a>
</div>

  <div class="nav-arrow next">
  <a href="page19.html">
    <i class="fas fa-arrow-right"></i>
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
async function downloadPNG() {
  const target = document.querySelector(".card");

  const actions = document.querySelector(".actions");
  const themeSwitcher = document.querySelector(".theme-switcher");
  const navArrows = document.querySelectorAll(".nav-arrow");

  /* ambil warna aktif dari container */
  const bgColor = getComputedStyle(target).backgroundColor;

  if (actions) actions.style.display = "none";
  if (themeSwitcher) themeSwitcher.style.display = "none";

  navArrows.forEach(nav => {
    nav.style.display = "none";
  });

  await new Promise(resolve => setTimeout(resolve, 200));

  const canvas = await html2canvas(target, {
    scale: 3,
    useCORS: true,
    backgroundColor:"#000000",
    logging: false
  });

  const link = document.createElement("a");
  link.download = "ocean-menu-premium.png";
  link.href = canvas.toDataURL("image/png", 1.0);
  link.click();

  if (actions) actions.style.display = "flex";
  if (themeSwitcher) themeSwitcher.style.display = "flex";

  navArrows.forEach(nav => {
    nav.style.display = "block";
  });
}
</script>
<script>

function updateName(){

  const input =
  document.getElementById("nameInput").value;

  document.getElementById("memberName")
  .innerText = input.toUpperCase();

}

function updateSchool(){

  const school =
  document.getElementById("schoolInput").value;

  document.getElementById("schoolName")
  .innerText = school.toUpperCase();

}

function updateMemberId(){

  const memberId =
  document.getElementById("memberIdInput").value;

  document.getElementById("memberId")
  .innerText = "#" + memberId;

}

</script>

</body>
</html>
